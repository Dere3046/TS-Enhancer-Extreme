name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK & NDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sLo tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/27.0.12077973" >> $GITHUB_ENV
          unset ANDROID_SDK_ROOT
          echo "ANDROID_SDK_ROOT=" >> $GITHUB_ENV

      - name: Set NDK linker env
        run: |
          NDK=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$NDK/i686-linux-android21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$NDK/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$NDK/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_armv7_linux_androideabi=$NDK/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "CC_i686_linux_android=$NDK/i686-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_x86_64_linux_android=$NDK/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK/llvm-ar" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$NDK/llvm-ar" >> $GITHUB_ENV
          echo "AR_i686_linux_android=$NDK/llvm-ar" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=$NDK/llvm-ar" >> $GITHUB_ENV

      - name: Fix gradlew permissions
        run: chmod +x tseet/gradlew

      - name: Configure
        env:
          RUSTFLAGS: -A unused_imports -A dead_code
        run: cmake -B build -S . -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        env:
          RUSTFLAGS: -A unused_imports -A dead_code
        run: cmake --build build --target ts-enhancer-extreme -j $(nproc)

      - name: Test WebUI
        working-directory: webui
        run: |
          npm install
          npm run test

      - name: Test TSEED (unit tests)
        working-directory: tsee/tseed
        run: cargo test --lib

      - uses: actions/upload-artifact@v4
        with:
          name: ts_enhancer_extreme
          path: build/output/ts_enhancer_extreme.zip
